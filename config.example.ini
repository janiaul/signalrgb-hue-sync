[general]
# Set to true to write a rotating log file (huesignal.log) alongside the app
logging = false

# Log level: DEBUG, INFO, WARNING, ERROR (default: INFO)
log_level = INFO

# Set to false to run headless (no system tray icon)
tray_icon = true

[hue]
# Local IP address of your Hue bridge
bridge_ip = 192.168.1.x

# Application key generated during Hue pairing (press the link button, then run the pairing tool)
application_key = YOUR_APPLICATION_KEY_HERE

# Name of the Entertainment Zone to mirror (must match exactly, case-insensitive)
entertainment_zone_name = My Entertainment Zone

# Populated automatically after first run - do not edit
entertainment_id =

# SHA-256 fingerprint of the Hue bridge TLS certificate - populated automatically on first run
# If the bridge certificate changes (e.g. after a firmware update), delete this line and restart to re-pin
bridge_cert_fingerprint =

# Rename this file to config.ini to use it